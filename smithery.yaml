# Smithery / MCP registry manifest — https://api.docimprint.com/mcp
name: docimprint
description: Verifiable document memory for AI agents. Extract, summarize, claim-check, collections, verify bundles.
version: 1.0.0
homepage: https://docimprint.com
repository: https://github.com/sawftware/darkroom-gw
license: Proprietary

mcp:
  type: remote
  url: https://api.docimprint.com/mcp
  transport: streamable-http

configSchema:
  type: object
  properties:
    apiKey:
      type: string
      title: API Key
      description: "Your DocImprint API key (dr_live_...)"
      x-to:
        header: Authorization
        format: "Bearer {value}"
  required:
    - apiKey

privacy_policy: https://docimprint.com/privacy
terms_of_service: https://docimprint.com/terms

tags:
  - x402
  - document-memory
  - evidence-bundle
  - MCP
  - legal-tech
  - compliance
  - AI-agents
